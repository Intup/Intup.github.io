 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XNX AIO - Supported Champions</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #141822;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent-gold: #cfb56d;  
            --accent-blue: #3b82f6;
            --border-color: #1e293b;
            --glow: rgba(59, 130, 246, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: radial-gradient(circle at top right, #1a202c 0%, var(--bg-color) 40%);
            padding: 40px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
 
        header { margin-bottom: 40px; }
        h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        h1 span { color: var(--accent-blue); }
        
        .search-bar {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: #0f131f;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px var(--glow); }
 
        .role-section { margin-bottom: 50px; }
        
        .section-title {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: var(--accent-gold);  
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background-color: var(--accent-gold);
            margin-right: 12px;
            border-radius: 2px;
        }

        .section-meta {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .champ-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
        }

        .champ-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .champ-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-5px);
            background-color: #1e2532;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }

        .champ-img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 8px;
            filter: brightness(0.9);
        }

        .champ-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .champ-card:hover .champ-name { color: white; }

        /* Badges (New, Hot, Updated) */
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            color: #000;
            z-index: 2;
        }
        .badge.new { background-color: #a855f7; color: white; }  
        .badge.hot { background-color: #ef4444; color: white; }  
        .badge.upd { background-color: #22c55e; color: white; }  
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>XNX <span>AIO</span></h1>
            <p style="color: #64748b; margin-bottom: 20px;">Champion Scripts</p>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search champion (ex: Ezreal)..." onkeyup="filterChamps()">
        </header>

        <div class="role-section" id="top">
            <div class="section-title">
                TOP
                <span class="section-meta">SOLO LANE</span>
            </div>
            <div class="champ-grid">
                <div class="champ-card" data-name="Irelia">
                    /*<span class="badge hot">HOT</span>*/
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Irelia.png" class="champ-img">
                    <div class="champ-name">Irelia</div>
                </div>

                <div class="champ-card" data-name="Camille">
                    <span class="badge new">NEW</span>
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Camille.png" class="champ-img">
                    <div class="champ-name">Camille</div>
                </div>

                <div class="champ-card" data-name="Darius">
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Darius.png" class="champ-img">
                    <div class="champ-name">Darius</div>
                </div>
                
                <div class="champ-card" data-name="Jax">
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Jax.png" class="champ-img">
                    <div class="champ-name">Jax</div>
                </div>
            </div>
        </div>

        <div class="role-section" id="jg">
            <div class="section-title">
                JUNGLE
                <span class="section-meta">FOREST</span>
            </div>
            <div class="champ-grid">
                <div class="champ-card" data-name="LeeSin">
                    <span class="badge upd">UPD</span>
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/LeeSin.png" class="champ-img">
                    <div class="champ-name">Lee Sin</div>
                </div>
                <div class="champ-card" data-name="Viego">
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Viego.png" class="champ-img">
                    <div class="champ-name">Viego</div>
                </div>
            </div>
        </div>

        <div class="role-section" id="mid">
            <div class="section-title">
                MID
                <span class="section-meta">MAGES & ASSASSINS</span>
            </div>
            <div class="champ-grid">
                <div class="champ-card" data-name="Ahri">
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Ahri.png" class="champ-img">
                    <div class="champ-name">Ahri</div>
                </div>
                <div class="champ-card" data-name="Yasuo">
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Yasuo.png" class="champ-img">
                    <div class="champ-name">Yasuo</div>
                </div>
                 <div class="champ-card" data-name="Yone">
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Yone.png" class="champ-img">
                    <div class="champ-name">Yone</div>
                </div>
            </div>
        </div>

        <div class="role-section" id="adc">
            <div class="section-title">
                ADC
                <span class="section-meta">MARKSMAN</span>
            </div>
            <div class="champ-grid">
                <div class="champ-card" data-name="Ezreal">
                    <span class="badge hot">HOT</span>
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Ezreal.png" class="champ-img">
                    <div class="champ-name">Ezreal</div>
                </div>
                <div class="champ-card" data-name="Jinx">
                    <img src="https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/Jinx.png" class="champ-img">
                    <div class="champ-name">Jinx</div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        function filterChamps() {
            var input = document.getElementById('searchInput');
            var filter = input.value.toUpperCase();
            var cards = document.getElementsByClassName('champ-card');

            for (i = 0; i < cards.length; i++) {
                var name = cards[i].getAttribute('data-name');
                if (name.toUpperCase().indexOf(filter) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
